name: Sync Fork

on:
  workflow_dispatch: # on button click
  schedule:
    - cron: '0 16 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: lecodeski/merge-upstream-defaults@main
        with:
          upstream: subframe7536/maple-font

      - name: Re-create the most recent tag from upstream on origin for a new release
        run: |
          LATEST=$(git ls-remote --tags upstream | grep -v '{}' | awk '{print $2}' | sed 's|refs/tags/||' | sort -V | tail -1)

          if ! git ls-remote --tags origin | grep -q "refs/tags/${LATEST}$"; then
            echo "Tag $LATEST doesn't exist on origin, creating it on HEAD"
            git tag -f "${LATEST}"  # -f to overwrite local tag from upstream
            git push origin "${LATEST}"
            echo "Created and pushed tag: $LATEST"
          else
            echo "Tag $LATEST already exists on origin"
          fi
