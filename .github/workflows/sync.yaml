name: Sync Fork

on:
  workflow_dispatch: # on button click
  schedule:
    - cron: '0 16 * * *'

env:
  UPSTREAM: subframe7536/maple-font
  GH_TOKEN: ${{ github.token }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Re-create the 'v-latest' tag when upstream has new tags
        run: |
          git remote add --fetch --tags upstream "https://github.com/${{ env.UPSTREAM }}.git"

          LATEST_TAG=$(git ls-remote --sort=committerdate upstream 'refs/tags/v*' | tail -1)
          UPSTREAM_SHA=${LATEST_TAG%$'\t'*}
          LATEST_VERSION=${LATEST_TAG#*v}

          if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD; then
            echo "Already up to date with $LATEST_TAG"
            exit 0
          fi
          echo "New upstream release: $LATEST_TAG"
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git merge upstream/$(gh repo view "${{ env.UPSTREAM }}" --json defaultBranchRef --jq '.defaultBranchRef.name')

          sed -i "s/version \".*\"/version \"$LATEST_VERSION\"/" Casks/font-maple-mono.rb

          git commit --all --m "[sync-fork]: bump Cask version to recent release $LATEST_VERSION" -m "based on commit $UPSTREAM_SHA"
          git tag --force v-latest
          git push --force origin main v-latest

          gh release delete v-latest --repo ${{ github.repository }} --yes 2>/dev/null || true
